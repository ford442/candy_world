name: Bundle Budget

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  budget:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"   # guard against Rollup/TSL OOM

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Install build-optimizer deps
        working-directory: tools/build-optimizer
        run: npm ci

      - name: Build (AssemblyScript WASM + Vite; no emsdk)
        run: pnpm run build:ci

      - name: Check budget
        run: pnpm run budget:check

      - name: Upload budget report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-report-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
          path: tools/build-optimizer/stats/budget-report.json
          retention-days: 14
          if-no-files-found: warn
