# Tier 2 — full Emscripten build + export verification.
# Intentionally NOT a required PR check: emsdk installs are heavy and can flake.
# Runs on release tags, nightly main, workflow_dispatch, and path-filtered main pushes.
name: Emscripten Verify

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - '*-stable*'
      - '20*'
    paths:
      - 'emscripten/**'
      - 'src/utils/wasm-*.ts'
      - 'verification/**'
      - 'scripts/check-emcc-manifest.mjs'
      - '.github/workflows/emscripten-verify.yml'
      - 'package.json'
  schedule:
    # Nightly sanity on main (UTC)
    - cron: '17 6 * * *'
  workflow_dispatch:

env:
  EM_VERSION: '4.0.10'
  CANDY_DEBUG: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    # Path filters on push:tags are ignored by GitHub when only tags: is set
    # under the same push block — tags always run. Scheduled + dispatch always run.
    steps:
      - uses: actions/checkout@v4

      - name: Setup emsdk
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: ${{ env.EM_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Verify em++
        run: em++ -v

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Build Emscripten WASM (CANDY_DEBUG=0)
        run: pnpm run build:emcc
        env:
          CANDY_DEBUG: '0'

      - name: Verify WASM exports (strict)
        run: pnpm run verify:emcc --strict

      - name: Lexical manifest lint (EXPECTED_EXPORTS ⊆ exports.txt)
        run: pnpm run verify:emcc:manifest

      - name: Fail if exports.txt drifted from the committed manifest
        run: |
          if ! git diff --exit-code -- emscripten/exports.txt; then
            echo ""
            echo "emscripten/exports.txt was regenerated by build:emcc and differs from git."
            echo "Commit the updated manifest:"
            echo "  CANDY_DEBUG=0 pnpm run build:emcc"
            echo "  pnpm run verify:emcc:manifest"
            echo "  git add emscripten/exports.txt && git commit -m 'chore: refresh emscripten/exports.txt'"
            exit 1
          fi

      - name: Upload native WASM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candy-native-${{ github.event_name }}-${{ github.run_id }}
          path: |
            public/candy_native.wasm
            public/candy_native.js
            public/candy_native_st.wasm
            public/candy_native_st.js
            emscripten/exports.txt
          retention-days: 14
          if-no-files-found: warn
