# Tier 1 — lexical export-manifest lint (no emsdk).
# Fast, deterministic gate for PRs that touch native / WASM-bridge code.
# Full em++ build lives in emscripten-verify.yml (tags / nightly / dispatch).
name: Emscripten Manifest

on:
  pull_request:
    branches: [main]
    paths:
      - 'emscripten/**'
      - 'src/utils/wasm-*.ts'
      - 'verification/verify_emcc_exports.js'
      - 'scripts/check-emcc-manifest.mjs'
      - '.github/workflows/emscripten-ci.yml'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'emscripten/**'
      - 'src/utils/wasm-*.ts'
      - 'verification/verify_emcc_exports.js'
      - 'scripts/check-emcc-manifest.mjs'
      - '.github/workflows/emscripten-ci.yml'
      - 'package.json'

jobs:
  manifest-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Lexical export manifest lint
        run: pnpm run verify:emcc:manifest
