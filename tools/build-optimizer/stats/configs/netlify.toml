# netlify.toml

[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    
# Netlify automatically compresses assets with Brotli and Gzip
# For custom compression settings, use build plugins
